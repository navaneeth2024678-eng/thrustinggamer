<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Storm Arena</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <h1 class="logo">STORM <span>ARENA</span></h1>

  <!-- STATUS -->
  <div class="status">● COMING SOON</div>

  <!-- COUNTDOWN -->
  <div class="countdown">
    <div><h2 id="days">00</h2><p>DAYS</p></div>
    <div><h2 id="hours">00</h2><p>HOURS</p></div>
    <div><h2 id="minutes">00</h2><p>MINS</p></div>
    <div><h2 id="seconds">00</h2><p>SECS</p></div>
  </div>

  <!-- DATE -->
  <p class="date">Launch: April 30, 2026</p>

</div>

<script src="script.js"></script>
</body>
</html>
