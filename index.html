<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Storm Arena</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="overlay"></div>

<div class="container">

  <!-- LOGO -->
  <h1 class="logo">
    STORM <span>ARENA</span>
  </h1>

  <!-- STATUS -->
  <div class="status">
    <span class="dot"></span> COMING SOON
  </div>

  <!-- TIMER -->
  <div class="countdown">
    <div class="time">
      <h2 id="days">00</h2>
      <span>DAYS</span>
    </div>

    <div class="colon">:</div>

    <div class="time">
      <h2 id="hours">00</h2>
      <span>HOURS</span>
    </div>

    <div class="colon">:</div>

    <div class="time">
      <h2 id="minutes">00</h2>
      <span>MINS</span>
    </div>

    <div class="colon">:</div>

    <div class="time">
      <h2 id="seconds">00</h2>
      <span>SECS</span>
    </div>
  </div>

  <!-- DATE -->
  <div class="launch-date">April 30, 2026</div>

</div>

<script src="script.js"></script>
</body>
</html>
